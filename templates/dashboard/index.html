<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>RTCTraining Dashboard</title>
    <link rel="stylesheet" href="/static/dashboard/dashboard.css">
  </head>
  <body>
    <main class="dashboard-shell">
      <header class="dashboard-header">
        <div>
          <h1>RTCTraining Dashboard</h1>
          <p id="serviceState">service_unchecked</p>
        </div>
        <button id="checkServiceButton" type="button">检查服务</button>
      </header>
      <section class="status-grid">
        <article class="status-panel">
          <h2>WebRTC Service</h2>
          <label for="webrtcOriginInput">Service Origin</label>
          <input id="webrtcOriginInput" value="https://localhost:8080">
          <p id="roomSummary">0 rooms</p>
        </article>
        <article class="status-panel stats-panel">
          <h2>Live Stats</h2>
          <label for="statsRoomInput">Room ID</label>
          <input id="statsRoomInput" value="room1">
          <p id="statsState">stats_unchecked</p>
          <ul id="peerPairList"></ul>
          <dl id="latestStatsPanel"></dl>
          <table id="statsHistoryTable">
            <thead>
              <tr>
                <th>Time</th>
                <th>Peer</th>
                <th>Remote</th>
                <th>RTT</th>
                <th>Loss</th>
                <th>Jitter</th>
                <th>Bitrate</th>
                <th>FPS</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </article>
        <article class="status-panel">
          <h2>CSV Analysis</h2>
          <p id="csvState">csv_waiting</p>
        </article>
      </section>
    </main>
    <script src="/static/dashboard/dashboard.js"></script>
    <script>
      (function () {
        window.__RTCTrainingDashboardInlineBootstrap = true;
        window.__RTCTrainingDashboardInlineServiceCheckPath = "/api/webrtc/members?origin=";
      })();
    </script>
  </body>
</html>

<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>RTCTraining</title>
    <link rel="stylesheet" href="/static/webrtc/chat_real.css?v=20260507-nack-mode-manual-bitrate-mobile-media">
  </head>
  <body>
    <main class="app-shell">
      <section class="topbar">
        <div>
          <h1>RTCTraining</h1>
          <p id="connectionState">idle</p>
        </div>
        <div class="room-controls">
          <label>
            <span>Room</span>
            <input id="roomIdInput" value="room1" aria-label="Room ID">
          </label>
          <label>
            <span>Name</span>
            <input id="displayNameInput" value="Learner" aria-label="Display name">
          </label>
          <label>
            <span>NACK</span>
            <select id="nackModeSelect" aria-label="NACK mode">
              <option value="enabled" selected>NACK on</option>
              <option value="disabled">NACK off</option>
            </select>
          </label>
          <span id="nackModeState">nack_enabled</span>
          <label>
            <span>Bitrate kbps</span>
            <input id="senderBitrateInput" type="number" min="0" step="1" inputmode="numeric" placeholder="auto" aria-label="Sender bitrate kbps">
          </label>
          <button id="applyBitrateButton" type="button">Apply</button>
          <span id="bitrateModeState">bitrate_auto</span>
        </div>
        <div class="mobile-action-bar" aria-label="Room actions">
          <button id="startMediaButton" type="button">Start Media</button>
          <button id="joinRoomButton" type="button">Join</button>
          <button id="leaveRoomButton" type="button">Leave</button>
        </div>
      </section>
      <section class="video-grid">
        <article>
          <h2>Local</h2>
          <video id="localVideo" autoplay muted playsinline></video>
        </article>
        <article>
          <h2>Remote</h2>
          <div id="remoteVideos" class="remote-video-grid grid-0"></div>
        </article>
      </section>
      <section class="timeline-panel">
        <h2>Timeline</h2>
        <ol id="timeline"></ol>
      </section>
    </main>
    <script src="/static/webrtc/chat_real_shared.js?v=20260507-nack-mode-manual-bitrate-mobile-media"></script>
    <script src="/static/webrtc/chat_real_nack.js?v=20260507-nack-mode-manual-bitrate-mobile-media"></script>
    <script src="/static/webrtc/chat_real_bitrate.js?v=20260507-manual-bitrate-mobile-media"></script>
    <script src="/static/webrtc/chat_real_session.js?v=20260507-nack-mode-manual-bitrate-mobile-media"></script>
    <script src="/static/webrtc/chat_real_stats.js?v=20260507-nack-mode-manual-bitrate-mobile-media"></script>
    <script src="/static/webrtc/chat_real_bootstrap.js?v=20260507-nack-mode-manual-bitrate-mobile-media"></script>
    <script>
      window.__RTCTrainingTestHooks = window.__RTCTrainingTestHooks || {};
    </script>
  </body>
</html>

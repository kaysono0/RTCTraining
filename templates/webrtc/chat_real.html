<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>RTCTraining</title>
    <link rel="stylesheet" href="/static/webrtc/chat_real.css?v=20260510-sdp-parsed-session-duration-readable-csv">
  </head>
  <body>
    <main class="app-shell">
      <section class="topbar">
        <div>
          <h1>RTCTraining</h1>
          <p id="connectionState">idle</p>
        </div>
        <div class="room-controls">
          <div class="control-group identity-control-group">
            <label>
              <span>Room <small class="param-effect-badge param-effect-reconnect">重连生效</small></span>
              <input id="roomIdInput" value="room1" aria-label="Room ID">
            </label>
            <label>
              <span>Name <small class="param-effect-badge param-effect-reconnect">重连生效</small></span>
              <input id="displayNameInput" value="Learner" aria-label="Display name">
            </label>
          </div>
          <div class="control-group nack-control-group">
            <label>
              <span>NACK <small class="param-effect-badge param-effect-reconnect">重连生效</small></span>
              <select id="nackModeSelect" aria-label="NACK mode">
                <option value="enabled" selected>NACK on</option>
                <option value="disabled">NACK off</option>
              </select>
            </label>
            <span id="nackModeState">nack_enabled</span>
          </div>
          <div class="control-group bitrate-control-group">
            <label>
              <span>Bitrate kbps <small class="param-effect-badge param-effect-immediate">即时生效</small></span>
              <input id="senderBitrateInput" type="number" min="0" step="1" inputmode="numeric" placeholder="auto" aria-label="Sender bitrate kbps">
            </label>
            <button id="applyBitrateButton" type="button">Apply</button>
            <span id="bitrateModeState">bitrate_auto</span>
          </div>
          <div class="control-group abr-control-group">
            <label>
              <span>ABR <small class="param-effect-badge param-effect-immediate">即时生效</small></span>
              <select id="abrModeSelect" aria-label="ABR mode">
                <option value="off" selected>ABR off</option>
                <option value="on">ABR on</option>
              </select>
            </label>
            <label>
              <span>ABR min <small class="param-effect-badge param-effect-immediate">即时生效</small></span>
              <input id="abrMinBitrateInput" type="number" min="1" step="1" value="300" aria-label="ABR min bitrate kbps">
            </label>
            <label>
              <span>ABR max <small class="param-effect-badge param-effect-immediate">即时生效</small></span>
              <input id="abrMaxBitrateInput" type="number" min="1" step="1" value="1500" aria-label="ABR max bitrate kbps">
            </label>
            <label>
              <span>ABR step <small class="param-effect-badge param-effect-immediate">即时生效</small></span>
              <input id="abrStepKbpsInput" type="number" min="1" step="1" value="150" aria-label="ABR step kbps">
            </label>
            <label>
              <span>Loss % <small class="param-effect-badge param-effect-immediate">即时生效</small></span>
              <input id="abrLossThresholdInput" type="number" min="0" step="0.1" value="5" aria-label="ABR loss threshold percent">
            </label>
            <label>
              <span>RTT ms <small class="param-effect-badge param-effect-immediate">即时生效</small></span>
              <input id="abrRttThresholdInput" type="number" min="1" step="1" value="300" aria-label="ABR RTT threshold ms">
            </label>
            <span id="abrModeState">abr_off</span>
          </div>
        </div>
        <div class="mobile-action-bar" aria-label="Room actions">
          <button id="startMediaButton" type="button">Start Media</button>
          <button id="joinRoomButton" type="button">Join</button>
          <button id="leaveRoomButton" type="button">Leave</button>
        </div>
      </section>
      <section class="test-session-panel" aria-label="Test session">
        <div class="test-session-controls">
          <label>
            <span>Preset</span>
            <select id="testPresetSelect" aria-label="Test preset">
              <option value="manual" selected>manual</option>
              <option value="nack_on">nack_on</option>
              <option value="nack_off">nack_off</option>
              <option value="bitrate_300">bitrate_300</option>
              <option value="bitrate_800">bitrate_800</option>
              <option value="nack_on_abr_off">nack_on_abr_off</option>
              <option value="nack_off_abr_off">nack_off_abr_off</option>
              <option value="abr_simple">abr_simple</option>
              <option value="nack_on_abr_on">nack_on_abr_on</option>
              <option value="nack_off_abr_on">nack_off_abr_on</option>
            </select>
          </label>
          <label>
            <span>Weak network</span>
            <input id="testWeakNetworkInput" value="none" placeholder="e.g. none, loss_5%, delay_100ms" aria-label="Weak network condition" title="记录测试时的弱网模拟条件，如 none / loss_5% / delay_100ms，便于后续对比分析">
          </label>
          <label>
            <span>Duration</span>
            <input id="testSessionDurationInput" type="number" min="1" step="1" value="60" aria-label="Planned test session duration seconds" title="计划录制时长，单位秒，仅用于记录和对比">
          </label>
          <label>
            <span>Note</span>
            <input id="testSessionNoteInput" placeholder="e.g. build version, environment, observations" aria-label="Test session note" title="测试备注，如构建版本、环境信息、观察到的现象等">
          </label>
          <button id="startTestSessionButton" type="button">Start Session</button>
          <button id="finishTestSessionButton" type="button">Finish</button>
          <button id="cancelTestSessionButton" type="button">Cancel</button>
          <span id="testSessionState">test_session_idle</span>
        </div>
        <div id="testSessionPresetSummary" class="test-session-summary">preset: manual</div>
        <div id="testSessionDetails" class="test-session-details"></div>
        <div id="testSessionDownloads" class="test-session-downloads" aria-label="Test session downloads"></div>
      </section>
      <section class="video-grid">
        <article>
          <h2>Local</h2>
          <video id="localVideo" autoplay muted playsinline></video>
        </article>
        <article>
          <h2>Remote</h2>
          <div id="remoteVideos" class="remote-video-grid grid-0"></div>
        </article>
      </section>
      <section class="timeline-panel">
        <h2>Timeline</h2>
        <ol id="timeline"></ol>
      </section>
    </main>
    <script src="/static/webrtc/chat_real_shared.js?v=20260508-mobile-media-sdp-parsed-view"></script>
    <script src="/static/webrtc/chat_real_nack.js?v=20260507-nack-mode-manual-bitrate-mobile-media"></script>
    <script src="/static/webrtc/chat_real_bitrate.js?v=20260508-nack-mode-manual-bitrate-auto-abr-mobile-media"></script>
    <script src="/static/webrtc/chat_real_test_session.js?v=20260510-test-session-duration-readable-csv"></script>
    <script src="/static/webrtc/rtc/stats_normalizer.js?v=20260509-stats-modules"></script>
    <script src="/static/webrtc/ui/remote_stats_view.js?v=20260509-stats-modules"></script>
    <script src="/static/webrtc/chat_real_session.js?v=20260508-mobile-media-sdp-parsed-view"></script>
    <script src="/static/webrtc/chat_real_stats.js?v=20260508-nack-mode-manual-bitrate-auto-abr-mobile-media"></script>
    <script src="/static/webrtc/chat_real_bootstrap.js?v=20260508-nack-mode-manual-bitrate-mobile-media-session-presets"></script>
    <script>
      window.__RTCTrainingTestHooks = window.__RTCTrainingTestHooks || {};
    </script>
  </body>
</html>
